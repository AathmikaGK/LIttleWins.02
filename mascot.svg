  <circle cx="100" cy="130" r="10" fill="#ffcc00" stroke="#b8860b" stroke-width="1.5"/>
  <text x="100" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="900" fill="#6c4a00">$</text>
  <!-- Arms -->
  <rect x="36" y="110" width="20" height="42" rx="10" fill="#14696d"/>
  <rect x="144" y="110" width="20" height="42" rx="10" fill="#14696d"/>
  <!-- Hands -->
  <circle cx="46" cy="156" r="8" fill="#a3ecf0"/>
  <circle cx="154" cy="156" r="8" fill="#a3ecf0"/>
  <!-- Legs -->
  <rect x="72" y="168" width="20" height="24" rx="10" fill="#14696d"/>
  <rect x="108" y="168" width="20" height="24" rx="10" fill="#14696d"/>
  <!-- Feet -->
  <rect x="66" y="186" width="30" height="12" rx="6" fill="#640031"/>
  <rect x="104" y="186" width="30" height="12" rx="6" fill="#640031"/>
</svg>
