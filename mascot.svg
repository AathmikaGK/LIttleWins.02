<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Antenna -->
  <line x1="100" y1="28" x2="100" y2="12" stroke="#14696d" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="8" r="6" fill="#14696d"/>
  <!-- Head -->
  <rect x="52" y="28" width="96" height="72" rx="18" fill="#1a237e"/>
  <!-- Visor -->
  <rect x="62" y="42" width="76" height="38" rx="12" fill="#e0e0ff"/>
  <!-- Eyes -->
  <circle cx="82" cy="61" r="10" fill="#14696d"/>
  <circle cx="118" cy="61" r="10" fill="#14696d"/>
  <circle cx="85" cy="58" r="3.5" fill="#fff"/>
  <circle cx="121" cy="58" r="3.5" fill="#fff"/>
  <!-- Mouth -->
  <rect x="88" y="72" width="24" height="4" rx="2" fill="#14696d"/>
  <!-- Ears -->
  <rect x="38" y="48" width="14" height="24" rx="7" fill="#640031"/>
  <rect x="148" y="48" width="14" height="24" rx="7" fill="#640031"/>
  <!-- Body -->
  <rect x="60" y="106" width="80" height="60" rx="14" fill="#1a237e"/>
  <!-- Chest panel -->
  <rect x="76" y="116" width="48" height="28" rx="8" fill="#e0e0ff"/>
